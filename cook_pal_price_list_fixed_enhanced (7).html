<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CookPal Smart Enterprise Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:'Segoe UI',Arial;background:#eef2f7}
.header{background:#1a3a5c;color:#fff;padding:12px 20px;font-weight:700}
.main{padding:15px}
#sheetTabs{display:flex;gap:20px;border-bottom:2px solid #ddd;margin-bottom:10px}
.tab{padding:8px 0;font-weight:600;color:#666;cursor:pointer;border-bottom:3px solid transparent}
.tab.active{color:#1a3a5c;border-bottom-color:#1a3a5c}

.wrap{overflow:auto;background:#fff;border-radius:8px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #eee;font-size:12px}
th{background:#1a3a5c;color:#fff}
tr:nth-child(even){background:#fafafa}
.city{font-weight:700}
.num{text-align:right;font-family:'Courier New'}
</style>
</head>
<body>

<div class="header">Smart Auto-Detect Price Dashboard</div>

<div class="main">
<div id="sheetTabs"></div>
<div class="wrap"><table id="table"></table></div>
<input type="file" id="fileInput" accept=".xlsx,.xls">
</div>

<script>
let workbook=null;

// Upload

document.getElementById('fileInput').addEventListener('change',e=>{
  const reader=new FileReader();
  reader.onload=function(evt){
    workbook=XLSX.read(evt.target.result,{type:'array'});
    renderTabs();
    loadSheet(workbook.SheetNames[0]);
  };
  reader.readAsArrayBuffer(e.target.files[0]);
});

function renderTabs(){
  document.getElementById('sheetTabs').innerHTML=
    workbook.SheetNames.map((n,i)=>
      `<div class="tab ${i===0?'active':''}" onclick="loadSheet('${n}',this)">${n}</div>`
    ).join('');
}

function loadSheet(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');

  const ws=workbook.Sheets[name];

  // 🔥 AUTO DETECT RAW DATA
  const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

  let rows=[];
  let lastState='';

  raw.forEach(r=>{
    // skip empty rows
    if(r.every(c=>c==='')) return;

    let state=(r[0]||'').toString().trim();
    let district=(r[1]||'').toString().trim();

    // auto carry forward state
    if(!state) state=lastState;
    else lastState=state;

    if(!district) return;

    let values=[];

    // auto detect numeric columns (skip first 2)
    for(let i=2;i<r.length;i++){
      let val=r[i];

      if(typeof val==='string') val=val.replace(/,/g,'');

      if(!isNaN(val) && val!==''){
        values.push(Number(val).toFixed(2));
      }else{
        values.push('');
      }
    }

    rows.push({state:state.toUpperCase(),district:district.toUpperCase(),values});
  });

  render(rows);
}

function render(rows){
  let html='';

  // 🔥 Exact SKU headers (fixed like your Excel)
  const headers750 = ['375g','1×16','1×10','13 Kg','15 Kg'];
  const headers790 = ['1×16','1×10'];

  html+=`<tr>
    <th>State</th>
    <th>District</th>
    <th colspan="5">750 Gms</th>
    <th colspan="2">790 Gms</th>
  </tr>`;

  html+=`<tr>
    <th></th><th></th>
    ${headers750.map(h=>`<th>${h}</th>`).join('')}
    ${headers790.map(h=>`<th>${h}</th>`).join('')}
  </tr>`;

  rows.forEach(r=>{
    html+='<tr>';

    html+=`<td>${r.state}</td>`;
    html+=`<td class="city">${r.district}</td>`;

    // ensure exactly 7 values
    let vals = r.values.slice(0,7);
    while(vals.length < 7) vals.push('');

    vals.forEach((v,i)=>{
      html+=`<td class="num">${v}</td>`;
    });

    html+='</tr>';
  });

</script>

</body>
</html>
